<!DOCTYPE html>
<html lang="fr" data-theme="light">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Bonus de bienvenue</title>
	<link rel="stylesheet" href="../theme.css" />
	<link rel="stylesheet" href="welcome-bonus.css" />
	<script src="../theme-toggle.js"></script>
	<script src="versions.js"></script>
</head>

<body>
	<div class="wrap">


		<header class="toolbar">
			<a href="../index.html" class="back-link">calleau's <em>utils</em></a>
			<h1 class="title">Bonus de bienvenue</h1>
		</header>

		<section>
			<div id="bookies-container"></div>
			<div class="bookies-controls">
				<div class="actions">
					<button class="btn btn-ghost" onclick="addBookie()">+ Ajouter un site</button>
					<button class="btn btn-ghost" onclick="removeBookie()">− Retirer le dernier</button>
				</div>
			</div>
		</section>

		<section>
			<div id="odds-container"></div>
		</section>

		<button class="btn btn-primary btn-calc" onclick="calculate()">Calculer les mises</button>

		<div id="results" style="display:none">
			<div id="error-container"></div>
			<div id="results-tabs-wrapper" hidden>
				<div class="results-tabs" role="tablist">
					<button class="results-tab results-tab--active" onclick="switchTab('combos')" role="tab">Combinaisons</button>
					<button class="results-tab" onclick="switchTab('result')" role="tab">Résultat</button>
				</div>
				<div id="tab-combos" class="results-tab-panel">
					<div id="combos-container"></div>
				</div>
				<div id="tab-result" class="results-tab-panel" hidden>
					<div id="gain-banner"></div>
					<div id="stakes-grid" class="stakes-grid"></div>
					<div id="breakdown-container"></div>
				</div>
			</div>
		</div>

		<footer class="page-footer">
			<span class="footer-version" id="footer-version"></span>
		</footer>

	</div>

	<!-- Boutons flottants (thème injecté par theme-toggle.js en premier) -->
	<div id="floating-actions">
		<button class="btn-versions-toggle" aria-label="Remplir les cotes aléatoirement"
			title="Remplir les cotes aléatoirement" onclick="randomizeOdds()">
			<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
				stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
				<rect x="2" y="2" width="20" height="20" rx="3" />
				<circle cx="8" cy="8" r="1.5" fill="currentColor" stroke="none" />
				<circle cx="16" cy="8" r="1.5" fill="currentColor" stroke="none" />
				<circle cx="8" cy="16" r="1.5" fill="currentColor" stroke="none" />
				<circle cx="16" cy="16" r="1.5" fill="currentColor" stroke="none" />
				<circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none" />
			</svg>
		</button>
		<div id="versions-widget">
			<button id="versions-btn" class="btn-versions-toggle" aria-label="Versions précédentes"
				title="Versions précédentes">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
					stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
					<circle cx="12" cy="12" r="10" />
					<polyline points="12 6 12 12 16 14" />
				</svg>
			</button>
			<div id="versions-dropdown" class="versions-dropdown" hidden>
				<p class="versions-msg">Chargement…</p>
			</div>
		</div>
	</div>

	<script src="welcome-bonus.js"></script>
</body>

</html>
