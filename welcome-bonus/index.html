<!DOCTYPE html>
<html lang="fr" data-theme="light">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Bonus de bienvenue</title>
	<link rel="stylesheet" href="../theme.css" />
	<link rel="stylesheet" href="welcome-bonus.css" />
	<script src="../theme-toggle.js"></script>
	<script src="versions.js"></script>
</head>

<body>
	<div class="wrap">


		<header class="toolbar">
			<a href="../index.html" class="back-link">calleau's <em>utils</em></a>
			<h1 class="title">Bonus de bienvenue</h1>
		</header>

		<section>
			<div id="bookies-container"></div>
			<div class="bookies-controls">
				<div class="actions">
					<button class="btn btn-ghost" onclick="addBookie()">+ Ajouter un site</button>
					<button class="btn btn-ghost" onclick="removeBookie()">− Retirer le dernier</button>
				</div>
				<div class="conv-rate-group">
					<span class="conv-rate-label">Taux de conversion freebet</span>
					<div class="numinput">
						<input type="number" id="convRate" value="80" min="1" max="100" step="1"
							onclick="this.select()" />
						<span class="unit">%</span>
						<div class="nbtn-wrap">
							<button class="nbtn" onclick="incrementConvRate()" type="button">▲</button>
							<button class="nbtn" onclick="decrementConvRate()" type="button">▼</button>
						</div>
					</div>
				</div>
			</div>
		</section>

		<button class="btn btn-primary btn-calc" onclick="calculate()">Calculer les mises</button>

		<div id="results" style="display:none">
			<div id="error-container"></div>
			<div id="gain-banner"></div>
			<div id="stakes-grid" class="stakes-grid"></div>
			<div id="breakdown-container"></div>
		</div>

		<footer class="page-footer">
			<span class="footer-version" id="footer-version"></span>
		</footer>

	</div>

	<!-- Widget versions précédentes -->
	<div id="versions-widget">
		<button id="versions-btn" class="btn-versions-toggle" aria-label="Versions précédentes"
			title="Versions précédentes">
			<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
				stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
				<circle cx="12" cy="12" r="10" />
				<polyline points="12 6 12 12 16 14" />
			</svg>
		</button>
		<div id="versions-dropdown" class="versions-dropdown" hidden>
			<p class="versions-msg">Chargement…</p>
		</div>
	</div>

	<script src="welcome-bonus.js"></script>
</body>

</html>
