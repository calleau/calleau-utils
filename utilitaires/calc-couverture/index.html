<!DOCTYPE html>
<html lang="fr" data-theme="light">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Calculatrice couverture</title>

	<link rel="stylesheet" href="../../theme.css" />
	<link rel="stylesheet" href="calc-couverture.css" />
	<script src="../../theme-toggle.js"></script>
	<script src="versions.js"></script>
	<script src="../../versions-widget.js"></script>
	<script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
	<main class="wrap">
		<header class="toolbar">
			<a href="../../index.html" class="back-link">calleau's <em>utils</em></a>
			<h1 class="title">Calculatrice couverture</h1>
		</header>

		<div id="calculators-container"></div>

		<div class="add-calculator-row">
			<button id="add-calculator" class="btn btn-secondary"><svg class="btn-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v17a1 1 0 0 1-1 1H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v6a1 1 0 0 1-1 1H3"/><path d="M16 19h6"/><path d="M19 22v-6"/></svg>Calculateur</button>
		</div>

		<section class="global-settings">
			<div class="global-setting-group">
				<label class="global-setting-toggle">
					<input type="checkbox" id="details-enabled">
					<span>Activer détails issues</span>
				</label>
			</div>
			<div class="global-setting-group">
				<label class="global-setting-toggle">
					<input type="checkbox" id="loss-dist-enabled">
					<span>Activer répartition de la perte</span>
				</label>
				<div class="global-setting-detail" id="loss-dist-detail" hidden>
					<label for="loss-dist-default">Répartition de la perte</label>
					<div class="num">
						<input type="text" id="loss-dist-default" inputmode="decimal" value="50" autocomplete="off" spellcheck="false">
						<span class="num-suffix">%</span>
					</div>
				</div>
			</div>
			<div class="global-setting-group">
				<label class="global-setting-toggle">
					<input type="checkbox" id="commission-enabled">
					<span>Activer commission</span>
				</label>
				<div class="global-setting-detail" id="commission-detail" hidden>
					<label for="commission-default">Commission Lay par défaut</label>
					<div class="num">
						<input type="text" id="commission-default" inputmode="decimal" value="3,00" autocomplete="off" spellcheck="false">
						<span class="num-suffix">%</span>
					</div>
				</div>
			</div>
		</section>

		<button id="cc-debug-state-btn" class="cc-debug-dl-btn" onclick="downloadDebugStateJson()" hidden>
			<img width="12" height="12" alt="" style="vertical-align:middle;margin-right:5px;" src="../../assets/icons/bug.svg" />Télécharger état actuel (debug)
		</button>

		<footer class="page-footer">
			<span class="footer-version" id="footer-version"></span>
			<button id="cc-debug-btn" class="cc-debug-btn" onclick="toggleDebug()" title="Mode debug">
				<img id="cc-debug-icon-off" class="cc-debug-icon" width="12" height="12" alt="" src="../../assets/icons/bug-off.svg" />
				<img id="cc-debug-icon-on" class="cc-debug-icon" width="12" height="12" alt="" src="../../assets/icons/bug.svg" hidden />
				debug
			</button>
		</footer>
	</main>

	<div id="floating-actions"></div>
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<script src="calc-couverture.js"></script>
</body>

</html>
