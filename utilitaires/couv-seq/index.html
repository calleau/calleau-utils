<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Couverture séquentielle</title>
<link rel="stylesheet" href="../../theme.css">
<link rel="stylesheet" href="couv-seq.css">
<script src="../../theme-toggle.js"></script>
<script src="versions.js"></script>
</head>
<body>
<div class="wrap">

  <header class="toolbar">
    <a href="../../index.html" class="back-link">calleau's <em>utils</em></a>
    <h1 class="title">Couverture séquentielle</h1>
  </header>

  <p class="sub">Lay · Back opposé · Combiné 2 matchs · Piwi Exchange</p>

  <div class="layout">
  <aside class="params-col">
    <div class="card settings">
      <div class="card-label">Paramètres généraux</div>
      <div>
        <div class="bet-section-label">Nombre de couvertures</div>
        <div class="bet-toggle bet-toggle--n" id="ncovers-toggle"></div>
      </div>
    </div>

    <!-- shims pour compat avec le panneau de droite (refactor à venir) -->
    <div hidden>
      <select id="bonusType"><option value="freebet" selected>freebet</option><option value="cash">cash</option></select>
      <input type="number" id="freebet" value="50">
    </div>

    <div class="card placed-bets-card">
      <div class="card-label">Paris placés</div>
      <div id="placed-bets" class="placed-bets"></div>
      <button class="btn-add-bet" onclick="addPlacedBet()">+ Ajouter un pari placé</button>
    </div>

    <button class="btn-save-config" onclick="saveCurrentConfig()">Enregistrer la configuration</button>

    <div class="card saved-configs-card">
      <div class="card-label">Configurations enregistrées</div>
      <div id="saved-configs" class="saved-configs"></div>
    </div>
  </aside>

  <section class="main-col">
    <div id="covers-container" class="covers-container"></div>
    <div id="results-summary" class="results-summary"></div>
  </section>
  </div>

  <footer class="page-footer">
    <span class="footer-version" id="footer-version"></span>
  </footer>
</div>

<div id="floating-actions">
  <div id="versions-widget">
    <button id="versions-btn" class="btn-versions-toggle" aria-label="Versions précédentes" title="Versions précédentes">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/>
      </svg>
    </button>
    <div id="versions-dropdown" class="versions-dropdown" hidden>
      <p class="versions-msg">Chargement…</p>
    </div>
  </div>
</div>

<script src="couv-seq.js"></script>
</body>
</html>
