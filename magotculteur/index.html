<!DOCTYPE html>
<html lang="fr" data-theme="light">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Le Magotculteur</title>
	<link rel="stylesheet" href="../theme.css" />
	<link rel="stylesheet" href="magotculteur.css" />
	<script src="../theme-toggle.js"></script>
</head>

<body>
	<div class="wrap">

		<header class="toolbar">
			<a href="../index.html" class="back-link">calleau's <em>utils</em></a>
			<h1 class="title">Le Magotculteur</h1>
			<p class="subtitle">Trouve la combinaison de couverture avec le moins de perte</p>
		</header>

		<div class="ff-layout">

			<!-- Panneau config -->
			<div class="ff-config card">

				<!-- Type de mise -->
				<div class="ff-field">
					<label class="ff-label">Type de mise</label>
					<div class="ff-legs-toggle">
						<button class="ff-bettype-btn ff-btn ff-btn--active" data-bettype="fb" onclick="setBetType('fb')">Freebet</button>
						<button class="ff-bettype-btn ff-btn" data-bettype="cash" onclick="setBetType('cash')">Cash</button>
					</div>
				</div>

				<!-- Montant -->
				<div class="ff-field">
					<label class="ff-label" for="ff-amount">Montant freebet</label>
					<div class="numinput">
						<input type="number" id="ff-amount" value="10" min="1" step="5"
							onclick="this.select()" />
						<span class="unit">€</span>
						<div class="nbtn-wrap">
							<button class="nbtn" onclick="stepAmount(5)">▲</button>
							<button class="nbtn" onclick="stepAmount(-5)">▼</button>
						</div>
					</div>
				</div>

				<!-- JSON -->
				<div class="ff-json-row">
					<div class="ff-json-label-row">
						<label class="ff-label" for="ff-json">Données JSON</label>
						<button class="btn btn-ghost ff-paste-btn" onclick="pasteFromClipboard()">Coller</button>
					</div>
					<textarea id="ff-json" class="ff-textarea"
						placeholder="Coller votre JSON ici…"
						oninput="onJsonChange()" spellcheck="false"></textarea>
					<p id="ff-json-error" class="ff-json-error" hidden></p>
				</div>

				<!-- Site freebet (méthode 1) -->
				<div id="ff-site-row">
					<div class="ff-field" id="ff-site-field" hidden>
						<label class="ff-label" for="ff-site-select">Site du freebet</label>
						<select id="ff-site-select">
							<option value="">— Sélectionner un site —</option>
						</select>
					</div>
				</div>

				<!-- Bouton calculer -->
				<button id="ff-calc-btn" class="ff-calc-btn" onclick="tryRender()" disabled>
					Calculer
				</button>
				<div id="ff-progress-wrap" hidden>
					<div id="ff-progress-bar"></div>
				</div>

			</div>

			<!-- Résultats -->
			<div class="ff-right">

				<!-- Onglets méthode + nombre de sélections -->
				<div class="ff-method-tabs">
					<div class="ff-method-group ff-method-group--tout" data-method="0" onclick="setMethodLegs(0,0)">
						<span class="ff-method-label" data-name="Tout">Tout</span>
					</div>
					<div class="ff-method-group ff-method-group--active" data-method="1">
						<span class="ff-method-label" data-name="Cash séquentiel">Cash séquentiel</span>
						<div class="ff-method-counts">
							<button class="ff-count-btn ff-count-btn--active" data-method="1" data-legs="1" onclick="setMethodLegs(1,1)">1</button>
							<button class="ff-count-btn" data-method="1" data-legs="2" onclick="setMethodLegs(1,2)">2</button>
							<button class="ff-count-btn" data-method="1" data-legs="3" onclick="setMethodLegs(1,3)">3</button>
						</div>
					</div>
					<div class="ff-method-group" data-method="3">
						<span class="ff-method-label" data-name="Mixte">Mixte</span>
						<div class="ff-method-counts">
							<button class="ff-count-btn" data-method="3" data-legs="2" onclick="setMethodLegs(3,2)">2</button>
							<button class="ff-count-btn" data-method="3" data-legs="3" onclick="setMethodLegs(3,3)">3</button>
						</div>
					</div>
					<div class="ff-method-group" data-method="2">
						<span class="ff-method-label" data-name="Couverture classique">Couverture classique</span>
						<div class="ff-method-counts">
							<button class="ff-count-btn" data-method="2" data-legs="1" onclick="setMethodLegs(2,1)">1</button>
							<button class="ff-count-btn" data-method="2" data-legs="2" onclick="setMethodLegs(2,2)">2</button>
							<button class="ff-count-btn" data-method="2" data-legs="3" onclick="setMethodLegs(2,3)">3</button>
						</div>
					</div>
				</div>

				<div id="ff-results" hidden></div>
			</div>

		</div>

		<footer class="page-footer">
			<span class="footer-version">v2.2.20</span>
		</footer>

	</div>

	<div id="floating-actions"></div>
	<script src="magotculteur.js"></script>
</body>

</html>
