<!DOCTYPE html>
<html lang="fr" data-theme="light">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Le Magotculteur</title>
	<script src="../theme-toggle.js"></script>
  <script type="module" crossorigin src="./assets/index-DQASHflL.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-C1IqyhJA.css">
</head>

<body>
	<div class="wrap">

		<header class="toolbar">
			<a href="../index.html" class="back-link">calleau's <em>utils</em></a>
			<h1 class="title">Le Magotculteur</h1>
			<p class="subtitle">Trouve la combinaison de couverture avec le moins de perte</p>
		</header>

		<div class="ff-layout">

			<!-- Panneau config -->
			<div class="ff-config card">

				<!-- 1. Données JSON -->
				<div class="ff-json-row">
					<div class="ff-json-label-row">
						<label class="ff-label" for="ff-json">Données JSON</label>
						<button class="btn btn-ghost ff-paste-btn" onclick="pasteFromClipboard()">Coller</button>
					</div>
					<textarea id="ff-json" class="ff-textarea"
						placeholder="Coller votre JSON ici…"
						oninput="onJsonChange()" spellcheck="false"></textarea>
					<p id="ff-json-error" class="ff-json-error" hidden></p>
				</div>

				<!-- 2. Type de mise -->
				<div class="ff-field">
					<label class="ff-label">Type de mise</label>
					<div class="ff-legs-toggle">
						<button class="ff-bettype-btn ff-btn ff-btn--active ff-btn--fb" data-bettype="fb" onclick="setBetType('fb')">Freebet</button>
						<button class="ff-bettype-btn ff-btn ff-btn--cash" data-bettype="cash" onclick="setBetType('cash')">Cash</button>
					</div>
				</div>

				<!-- 3. Sites -->
				<div class="ff-field">
					<div class="ff-field-header">
						<label class="ff-label">Sites</label>
						<label class="ff-toggle-label ff-advanced-toggle">
							<input type="checkbox" id="ff-advanced-cb" onchange="setAdvancedMode(this.checked)" />
							Mode avancé
						</label>
					</div>

					<!-- Mode simple -->
					<div id="ff-simple-mode">

						<!-- Site principal -->
						<div class="ff-subfield">
							<label class="ff-sublabel">Site principal</label>
							<div id="ff-site-select-wrap" class="ff-site-btns-wrap">
								<p class="ff-no-sites">Chargez un JSON pour voir les sites.</p>
							</div>
						</div>

						<!-- Montant -->
						<div class="ff-subfield">
							<label class="ff-sublabel" id="ff-amount-label">Montant misé</label>
							<div class="ff-legs-toggle ff-legs-toggle--sm">
								<button class="ff-amountmode-btn ff-btn ff-btn--sm ff-btn--active" data-mode="mise_totale" onclick="setAmountMode('mise_totale')"><span class="ff-amountmode-label" data-mode="mise_totale">Mise totale</span></button>
								<button class="ff-amountmode-btn ff-btn ff-btn--sm" data-mode="mise_min_par_pari" onclick="setAmountMode('mise_min_par_pari')"><span class="ff-amountmode-label" data-mode="mise_min_par_pari">Mise min. par pari</span></button>
								<button class="ff-amountmode-btn ff-btn ff-btn--sm" data-mode="profit_net_min" onclick="setAmountMode('profit_net_min')">Profit net min.</button>
								<button class="ff-amountmode-btn ff-btn ff-btn--sm" data-mode="profit_brut" onclick="setAmountMode('profit_brut')">Profit brut</button>
							</div>
							<div class="numinput" id="ff-amount-wrap">
								<input type="number" id="ff-amount-input" value="10" min="0.5" step="5"
									onclick="this.select()" oninput="onAmountInput(this.value)" />
								<span class="unit">€</span>
								<div class="nbtn-wrap">
									<button class="nbtn" onclick="stepAmount(5)">▲</button>
									<button class="nbtn" onclick="stepAmount(-5)">▼</button>
								</div>
							</div>
						</div>

						<!-- Objectif (cash uniquement) -->
						<div class="ff-subfield" id="ff-objective-field" hidden>
							<label class="ff-sublabel">Objectif</label>
							<div class="ff-legs-toggle ff-legs-toggle--sm">
								<button class="ff-objective-btn ff-btn ff-btn--sm" data-objective="gagner" onclick="setObjective('gagner')">Gagner</button>
								<button class="ff-objective-btn ff-btn ff-btn--sm ff-btn--active" data-objective="miser" onclick="setObjective('miser')">Miser</button>
								<button class="ff-objective-btn ff-btn ff-btn--sm" data-objective="perdre" onclick="setObjective('perdre')">Perdre</button>
							</div>
						</div>

						<!-- Cote minimum -->
						<div class="ff-subfield">
							<label class="ff-sublabel" for="ff-filter-odds">Cote minimum</label>
							<div class="numinput numinput--sm">
								<input type="number" id="ff-filter-odds" value="" min="1" step="0.05" placeholder="—"
									oninput="setMinOddsFilter(this.value)" onclick="this.select()" />
								<div class="nbtn-wrap">
									<button class="nbtn" onclick="var i=document.getElementById('ff-filter-odds'); i.value=(parseFloat(i.value)||1)+0.05; setMinOddsFilter(i.value)">▲</button>
									<button class="nbtn" onclick="var i=document.getElementById('ff-filter-odds'); i.value=Math.max(1,(parseFloat(i.value)||1)-0.05).toFixed(2); setMinOddsFilter(i.value)">▼</button>
								</div>
							</div>
						</div>

						<!-- Cote minimum par sélection -->
						<div class="ff-subfield">
							<label class="ff-sublabel" for="ff-min-odds-sel">Cote min. par sélection</label>
							<div class="numinput numinput--sm">
								<input type="number" id="ff-min-odds-sel" value="" min="1" step="0.05" placeholder="—"
									oninput="setMinOddsPerSelection(this.value)" onclick="this.select()" />
								<div class="nbtn-wrap">
									<button class="nbtn" onclick="var i=document.getElementById('ff-min-odds-sel'); i.value=(parseFloat(i.value)||1)+0.05; setMinOddsPerSelection(i.value)">▲</button>
									<button class="nbtn" onclick="var i=document.getElementById('ff-min-odds-sel'); i.value=Math.max(1,(parseFloat(i.value)||1)-0.05).toFixed(2); setMinOddsPerSelection(i.value)">▼</button>
								</div>
							</div>
						</div>

					</div><!-- /ff-simple-mode -->

					<!-- Mode avancé -->
					<div id="ff-advanced-mode" hidden>
						<div id="ff-advanced-sites-wrap"></div>
					</div>

				</div><!-- /Sites field -->

				<!-- 4. Paramètres généraux -->
				<div class="ff-field" id="ff-nlegs-field">
					<label class="ff-label">Nb combinés à calculer</label>
					<div class="ff-legs-toggle">
						<button class="ff-nlegs-btn ff-btn ff-btn--active" data-n="1" onclick="toggleNLegs(1)">1</button>
						<button class="ff-nlegs-btn ff-btn ff-btn--active" data-n="2" onclick="toggleNLegs(2)">2</button>
						<button class="ff-nlegs-btn ff-btn ff-btn--active" data-n="3" onclick="toggleNLegs(3)">3</button>
						<button class="ff-nlegs-btn ff-btn" data-n="4" onclick="toggleNLegs(4)" title="Calcul potentiellement très long">4 ⚠</button>
						<button class="ff-nlegs-btn ff-btn" data-n="5" onclick="toggleNLegs(5)" title="Calcul très long, déconseillé avec beaucoup d'events">5 ⚠</button>
					</div>
				</div>

				<div class="ff-field">
					<label class="ff-label">Méthodes de placement</label>
					<div class="ff-methods-grid">
						<label class="ff-toggle-label">
							<input type="checkbox" id="ff-cb-seq" checked onchange="setMethodToggle('seq', this.checked)" />
							Séquentiel
						</label>
						<label class="ff-toggle-label">
							<input type="checkbox" id="ff-cb-simult" checked onchange="setMethodToggle('simult', this.checked)" />
							Simultané
						</label>
						<label class="ff-toggle-label">
							<input type="checkbox" id="ff-cb-uni" checked onchange="setMethodToggle('uni', this.checked)" />
							Uni-site
						</label>
						<label class="ff-toggle-label">
							<input type="checkbox" id="ff-cb-multi" checked onchange="setMethodToggle('multi', this.checked)" />
							Multi-sites
						</label>
						<label class="ff-toggle-label">
							<input type="checkbox" id="ff-cb-sym" checked onchange="setMethodToggle('sym', this.checked)" />
							Symétrique
						</label>
						<label class="ff-toggle-label">
							<input type="checkbox" id="ff-cb-asym" onchange="setMethodToggle('asym', this.checked)" />
							Asymétrique
						</label>
					</div>
				</div>

				<!-- Bouton calculer -->
				<button id="ff-calc-btn" class="ff-calc-btn" onclick="tryRender()" disabled>
					Calculer
				</button>

				<!-- Bouton debug (visible uniquement en mode debug) -->
				<button id="ff-debug-dl-btn" class="ff-debug-dl-btn" onclick="downloadDebugJson()" hidden>
					⬇ Télécharger les paramètres (debug)
				</button>

			</div>

			<!-- Résultats -->
			<div class="ff-right">
				<div id="ff-results" hidden></div>
			</div>

		</div>

		<footer class="page-footer">
			<span class="footer-version">v6.0.6</span>
			<button id="ff-debug-btn" class="ff-debug-btn" onclick="toggleDebug()" title="Mode debug">
				<img id="ff-debug-icon-off" class="ff-debug-icon" width="12" height="12" alt="" />
				<img id="ff-debug-icon-on" class="ff-debug-icon" width="12" height="12" alt="" hidden />
				debug
			</button>
		</footer>

	</div>

	<div id="floating-actions"></div>

	<!-- Popover filtre colonne -->
	<div id="ff-col-filter-popover" hidden></div>

	<!-- Overlay de calcul -->
	<div id="ff-calc-overlay" hidden aria-live="polite">
		<div class="ff-calc-overlay-inner">
			<div class="ff-calc-spinner"></div>
			<p id="ff-calc-overlay-label" class="ff-calc-overlay-label"></p>
			<p id="ff-calc-overlay-detail" class="ff-calc-overlay-detail"></p>
			<p id="ff-calc-overlay-count" class="ff-calc-overlay-count"></p>
			<div class="ff-calc-overlay-bar-wrap">
				<div id="ff-calc-overlay-bar" class="ff-calc-overlay-bar"></div>
			</div>
			<button class="ff-calc-cancel-btn" onclick="cancelCalc()">Annuler</button>
		</div>
	</div>

</body>

</html>
