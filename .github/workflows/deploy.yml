name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: utilitaires/magotculteur/package-lock.json

      - name: Build Magotculteur
        working-directory: utilitaires/magotculteur
        run: |
          npm ci
          npm run build

      - name: Prepare deployment directory
        run: |
          mkdir -p _site

          # Copie tout le repo sauf les dossiers inutiles en prod
          # utilitaires/magotculteur est exclu : il sera remplacé par le build Vite
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='utilitaires/magotculteur' \
            . _site/

          # Remplace utilitaires/magotculteur/ par le résultat du build Vite
          cp -r utilitaires/magotculteur/dist _site/utilitaires/magotculteur

          # Aplatit utilitaires/* à la racine du site
          # (les URLs publiques restent /fb-conv/, /surebet/, etc.)
          shopt -s dotglob
          mv _site/utilitaires/* _site/
          rmdir _site/utilitaires

          # Compense le décalage d'un niveau pour les seules ressources racine.
          # Les fichiers déplacés contiennent ../../foo (depuis utilitaires/x/) ;
          # après aplatissement ils sont à _site/x/, donc ../foo suffit.
          # On utilise une whitelist pour éviter de toucher les références
          # entre calculateurs frères (ex: ../welcome-bonus/welcome-bonus.css).
          ROOT_RES='(theme\.css|theme-toggle\.js|homepage\.css|script\.js|index\.html|versions-widget\.js|assets/)'
          find _site -type f \( -name '*.html' -o -name '*.js' -o -name '*.css' -o -name '*.mjs' \) \
            -not -path '_site/assets/*' \
            -print0 | \
            xargs -0 sed -i -E "s#([\"'(=])\.\./((\.\./)*${ROOT_RES})#\1\2#g"

          # Retire le préfixe utilitaires/ des liens du menu de la page d'accueil
          sed -i 's#href="utilitaires/#href="#g' _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
